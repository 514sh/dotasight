services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    networks:
      - app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      - redis
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - app

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - app

volumes:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  app:
    driver: bridge
